name: Deploy Discord Bot

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 'Discord Bot Deployment'
    steps:
      - name: Checkout (Optional but good practice)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            
            # Ensure directory exists and is a git repo
            if [ ! -d "/opt/discord-bot/.git" ]; then
              sudo mkdir -p /opt/discord-bot
              sudo chown ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /opt/discord-bot
              git clone https://github.com/${{ github.repository }}.git /opt/discord-bot
            fi

            cd /opt/discord-bot
            git pull origin main

            # Build image
            sudo docker build --no-cache -t discord-bot .

            # Stop and remove old container
            sudo docker stop discord-bot || true
            sudo docker rm discord-bot || true

            # Run with environment variables
            sudo docker run -d \
              --name discord-bot \
              --restart unless-stopped \
              -e DISCORD_TOKEN="${{ secrets.DISCORD_TOKEN }}" \
              discord-bot
          EOF
