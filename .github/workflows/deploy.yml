name: Deploy Discord Bot

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: |
           ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: |
            ${{ secrets.SSH_KEY }}
          script: |
            cd /home/QuantifiedQuantum/discord-bot
            sh deploy.sh